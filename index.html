<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>白六麻將 - 修正啟動版</title>
    <style>
        :root {
            --tile-w: calc((100vw - 60px) / 9); 
            --tile-h: calc(var(--tile-w) * 1.35);
            --gap: 3px;
            --bg-color: #064e3b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { 
            background: var(--bg-color); margin: 0; font-family: sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; color: white;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        .header { padding: 10px; text-align: center; background: rgba(0,0,0,0.8); color: #fbbf24; font-size: 16px; font-weight: bold; flex-shrink: 0; min-height: 40px; }
        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: calc(var(--tile-h) + 15px); }
        .grid { display: flex; gap: var(--gap); justify-content: center; }
        .column { display: flex; flex-direction: column; gap: var(--gap); width: var(--tile-w); position: relative; border-radius: 4px; }
        .column.highlight { background: rgba(251, 191, 36, 0.4); box-shadow: 0 0 15px #fbbf24; }
        .entry-slot { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            top: calc((var(--tile-h) + var(--gap)) * -1); 
            background: #fff; border-radius: 4px; display: flex; justify-content: center; align-items: center;
            font-size: calc(var(--tile-w) * 0.8); color: #000; box-shadow: 0 0 12px #fbbf24; z-index: 10;
            opacity: 0; pointer-events: none; transition: 0.15s;
        }
        .entry-slot.active { opacity: 1; pointer-events: auto; }
        .tile { 
            width: var(--tile-w); height: var(--tile-h); background: #fff; border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: calc(var(--tile-w) * 0.8); color: #000;
            box-shadow: inset -1px -1px 2px #ccc, 1px 1px 3px rgba(0,0,0,0.4); 
            transition: transform 0.2s ease-out;
        }
        .tile.hidden { background: linear-gradient(135deg, #22c55e, #14532d); color: transparent; }
        #grid-cpu { transform: rotate(180deg); }
        .controls { padding: 10px; background: #000; display: flex; justify-content: center; align-items: center; gap: 15px; flex-shrink: 0; min-height: 100px; }
        .draw-btn { width: 65px; height: 80px; background: #15803d; border: 2px solid #fff; border-radius: 8px; font-size: 16px; font-weight: bold; color: #fff; cursor: pointer; }
        .draw-btn:disabled { opacity: 0.3; pointer-events: none; }
        .slot-preview { width: 60px; height: 75px; background: #fff; border-radius: 6px; font-size: 35px; display: flex; justify-content: center; align-items: center; color: #000; }
        #overlay { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.85); font-size: 30px; }
    </style>
</head>
<body>
<div id="overlay"></div>
<div class="header" id="msg">載入中...</div>
<div class="game-main">
    <div class="board"><div class="grid" id="grid-cpu"></div></div>
    <div class="board"><div class="grid" id="grid-p1"></div></div>
</div>
<div class="controls">
    <div id="slot-preview" class="slot-preview"></div>
    <button class="draw-btn" id="draw-btn">抽牌</button>
</div>

<script>
    const MASTERS = {
        '萬': ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'],
        '筒': ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'],
        '條': ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘']
    };
    const OTHERS = ['🀄','🀅','🀆','🀀','🀁','🀂','🀃'];

    const game = {
        p1: null, cpu: null, deck: [], p1Data: [], cpuData: [],
        isBusy: false, gameOver: false, touchStartY: 0, wildChar: '',

        init() {
            try {
                const keys = Object.keys(MASTERS).sort(() => Math.random() - 0.5);
                this.p1 = { name: keys[0], tiles: MASTERS[keys[0]] };
                this.cpu = { name: keys[1], tiles: MASTERS[keys[1]] };
                
                const wildPool = [...MASTERS[keys[2]], ...OTHERS];
                this.wildChar = wildPool[Math.floor(Math.random() * wildPool.length)];

                this.log(`你是【${this.p1.name}】，電腦是【${this.cpu.name}】`);
                this.buildDeck();
                
                this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
                this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
                
                this.render();
                document.getElementById('draw-btn').onclick = () => this.startByDrawing();
            } catch (e) {
                this.log("啟動失敗，請刷新頁面");
                console.error(e);
            }
        },

        buildDeck() {
            let cards = [];
            [this.p1, this.cpu].forEach(group => {
                group.tiles.forEach((char, idx) => {
                    for(let n=0; n<4; n++) cards.push({ group: group.name, val: idx+1, char: char, isWild: false });
                });
            });
            cards.push({ group: 'wild', val: 0, char: this.wildChar, isWild: true });
            this.deck = cards.sort(() => Math.random() - 0.5);
        },

        render() {
            const drawGrid = (id, data) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.innerHTML = '';
                for(let col=0; col<9; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column'; colDiv.dataset.col = col;
                    const entry = document.createElement('div');
                    entry.className = 'entry-slot'; entry.id = `entry-${id.split('-')[1]}-${col}`;
                    colDiv.appendChild(entry);
                    for(let row=0; row<4; row++) {
                        const t = document.createElement('div');
                        t.className = `tile ${data[row*9+col].hidden ? 'hidden' : ''}`;
                        t.innerText = data[row*9+col].char;
                        colDiv.appendChild(t);
                    }
                    el.appendChild(colDiv);
                }
            };
            drawGrid('grid-p1', this.p1Data);
            drawGrid('grid-cpu', this.cpuData);
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').disabled = true;
            if(this.deck.length === 0) { this.log("牌組已空！"); return; }
            await this.handleChain(this.deck.pop(), 'p1');
        },

        async handleChain(card, currentTurn) {
            document.getElementById('slot-preview').innerText = card.char;
            let side = card.isWild ? currentTurn : (card.group === this.p1.name ? 'p1' : (card.group === this.cpu.name ? 'cpu' : currentTurn));
            
            if (side === 'p1') {
                if (card.isWild) {
                    this.log("★ 唯一萬用牌：請點選一列 ★");
                    this.enableColumnSelection(card);
                } else {
                    this.showEntryAndPrepareSlide(card.val - 1, card);
                }
            } else {
                let col = card.isWild ? this.autoFindCol('cpu') : ((card.val >= 1 && card.val <= 9) ? (card.val - 1) : this.autoFindCol('cpu'));
                await new Promise(r => setTimeout(r, 600));
                await this.executePush('cpu', col, card);
            }
        },

        enableColumnSelection(card) {
            const columns = document.querySelectorAll('#grid-p1 .column');
            columns.forEach(colEl => {
                colEl.classList.add('highlight');
                colEl.onclick = () => {
                    columns.forEach(el => { el.classList.remove('highlight'); el.onclick = null; });
                    this.showEntryAndPrepareSlide(parseInt(colEl.dataset.col), card);
                };
            });
        },

        showEntryAndPrepareSlide(col, card) {
            this.log(card.isWild ? "萬用牌：向下推入" : "請向下滑動推入");
            const entry = document.getElementById(`entry-p1-${col}`);
            if (!entry) return;
            entry.innerText = card.char;
            entry.classList.add('active');
            
            entry.ontouchstart = (e) => this.touchStartY = e.touches[0].clientY;
            entry.ontouchend = (e) => {
                if ((e.changedTouches[0].clientY - this.touchStartY) > 20) {
                    entry.classList.remove('active');
                    entry.ontouchstart = entry.ontouchend = null;
                    this.executePush('p1', col, card);
                }
            };
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const bumped = {...data[3 * 9 + col]};
            for(let r=3; r>0; r--) data[r*9 + col] = {...data[(r-1)*9 + col]};
            data[col] = {...card, hidden: false};

            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const tiles = colEl.querySelectorAll('.tile');
            tiles.forEach(t => t.style.transform = 'translateY(var(--tile-h))');
            
            await new Promise(r => setTimeout(r, 200));
            this.renderCol(side, col);

            if(this.checkWin()) return;
            if(bumped && bumped.char) {
                bumped.hidden = false;
                await this.handleChain(bumped, side);
            } else {
                this.isBusy = false;
                document.getElementById('draw-btn').disabled = false;
                this.log(`牌組剩餘: ${this.deck.length} 張`);
            }
        },

        renderCol(side, col) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const tiles = colEl.querySelectorAll('.tile');
            for(let r=0; r<4; r++) {
                tiles[r].className = `tile ${data[r*9+col].hidden ? 'hidden' : ''}`;
                tiles[r].innerText = data[r*9+col].char;
                tiles[r].style.transform = 'none';
            }
        },

        autoFindCol(side) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            for(let c=0; c<9; c++) if(data[3*9+c].hidden) return c;
            return Math.floor(Math.random() * 9);
        },

        checkWin() {
            const isFull = (d) => d.every(c => !c.hidden);
            if(isFull(this.p1Data)) return this.endGame(true);
            if(isFull(this.cpuData)) return this.endGame(false);
            return false;
        },

        endGame(isWin) {
            this.gameOver = true;
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = isWin ? '<div style="color:#fbbf24">🎊 大滿貫勝利 🎊</div>' : '<div style="color:#94a3b8">殘念！電腦勝</div>';
            overlay.onclick = () => location.reload();
            return true;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    // 確保 DOM 載入後再初始化
    window.onload = () => game.init();
</script>
</body>
</html>
