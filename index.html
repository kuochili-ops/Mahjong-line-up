<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>зҷҪе…ӯйә»е°Ү - жңҖзөӮе„ӘеҢ–зүҲ</title>
    <style>
        :root {
            --full-h: 100dvh;
            --tile-w: calc((100vw - 40px) / 9); 
            --tile-h: calc(var(--tile-w) * 1.35);
            --gap: 2px;
            --bg-color: #064e3b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            background: var(--bg-color); margin: 0; padding: 0;
            height: var(--full-h); display: flex; flex-direction: column;
            overflow: hidden; color: white; font-family: -apple-system, sans-serif;
        }
        
        .header { 
            height: 44px; display: flex; align-items: center; justify-content: center;
            background: #000; color: #fbbf24; font-size: 14px; font-weight: bold; flex-shrink: 0;
        }
        
        .game-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: space-around; align-items: center; padding: 10px 0;
        }
        
        .grid { display: flex; gap: var(--gap); justify-content: center; }
        .column { 
            display: flex; flex-direction: column; gap: var(--gap); 
            width: var(--tile-w); position: relative; border-radius: 4px;
            transition: background 0.3s;
        }
        
        /* иҗ¬з”ЁзүҢй»һйҒёжҸҗзӨә */
        .column.highlight { 
            background: rgba(251, 191, 36, 0.5); 
            box-shadow: 0 0 15px #fbbf24; 
            z-index: 5;
        }

        .entry-slot { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            top: calc((var(--tile-h) + 10px) * -1); 
            background: #fff; border-radius: 4px; display: flex; justify-content: center; align-items: center;
            font-size: calc(var(--tile-w) * 0.8); color: #000; 
            box-shadow: 0 0 15px #fbbf24; z-index: 20;
            opacity: 0; transform: scale(0.8); transition: 0.2s;
        }
        .entry-slot.active { opacity: 1; transform: scale(1.1); }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); background: #fff; border-radius: 3px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: calc(var(--tile-w) * 0.8); color: #000;
            box-shadow: inset -1px -1px 2px #ccc, 1px 1px 2px rgba(0,0,0,0.3);
        }
        .tile.hidden { background: linear-gradient(135deg, #166534, #064e3b); color: transparent; border: 1px solid #052e16; }

        #grid-cpu { transform: rotate(180deg); }
        
        .controls { 
            height: 120px; background: #111; display: flex; 
            justify-content: center; align-items: center; gap: 25px; 
            padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
        }
        
        .draw-btn { 
            width: 75px; height: 75px; background: #15803d; border: 3px solid #fff; 
            border-radius: 50%; font-size: 18px; font-weight: bold; color: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .draw-btn:active { transform: scale(0.95); background: #166534; }
        .draw-btn:disabled { opacity: 0.3; }
        
        .preview-box { 
            width: 60px; height: 80px; background: #fff; border-radius: 6px; 
            font-size: 40px; display: flex; justify-content: center; align-items: center; 
            color: #000; border: 2px solid #fbbf24;
        }

        #overlay { 
            position: fixed; inset: 0; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            background: rgba(0,0,0,0.9); font-size: 32px; font-weight: bold;
        }
    </style>
</head>
<body>
<div id="overlay"></div>
<div class="header" id="msg">еҲқе§ӢеҢ–зүҢзө„дёӯ...</div>

<div class="game-area">
    <div id="grid-cpu" class="grid"></div>
    <div id="grid-p1" class="grid"></div>
</div>

<div class="controls">
    <div id="slot-preview" class="preview-box"></div>
    <button id="draw-btn" class="draw-btn">жҠҪзүҢ</button>
</div>

<script>
    const MASTERS = {
        'иҗ¬': ['рҹҖҮ','рҹҖҲ','рҹҖү','рҹҖҠ','рҹҖӢ','рҹҖҢ','рҹҖҚ','рҹҖҺ','рҹҖҸ'],
        'зӯ’': ['рҹҖҷ','рҹҖҡ','рҹҖӣ','рҹҖң','рҹҖқ','рҹҖһ','рҹҖҹ','рҹҖ ','рҹҖЎ'],
        'жўқ': ['рҹҖҗ','рҹҖ‘','рҹҖ’','рҹҖ“','рҹҖ”','рҹҖ•','рҹҖ–','рҹҖ—','рҹҖҳ']
    };
    const OTHERS = ['рҹҖ„','рҹҖ…','рҹҖҶ','рҹҖҖ','рҹҖҒ','рҹҖӮ','рҹҖғ'];

    const game = {
        p1: null, cpu: null, deck: [], p1Data: [], cpuData: [],
        isBusy: false, gameOver: false, touchStart: 0, wildChar: '',

        init() {
            const keys = Object.keys(MASTERS).sort(() => Math.random() - 0.5);
            this.p1 = { name: keys[0], tiles: MASTERS[keys[0]] };
            this.cpu = { name: keys[1], tiles: MASTERS[keys[1]] };
            
            // е”ҜдёҖиҗ¬з”ЁзүҢе®ҡзҫ©
            const wildPool = [...MASTERS[keys[2]], ...OTHERS];
            this.wildChar = wildPool[Math.floor(Math.random() * wildPool.length)];

            this.log(`зҺ©е®¶пјҡ${this.p1.name} | йӣ»и…Ұпјҡ${this.cpu.name}`);
            
            // ж§Ӣе»ә 73 ејөзүҢ
            let cards = [];
            [this.p1, this.cpu].forEach(g => {
                g.tiles.forEach((char, idx) => {
                    for(let n=0; n<4; n++) cards.push({ group: g.name, val: idx+1, char, isWild: false });
                });
            });
            cards.push({ group: 'wild', val: 0, char: this.wildChar, isWild: true });
            this.deck = cards.sort(() => Math.random() - 0.5);

            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            
            this.render();
            document.getElementById('draw-btn').onclick = () => this.startByDrawing();
        },

        render() {
            const draw = (id, data) => {
                const el = document.getElementById(id);
                el.innerHTML = '';
                for(let c=0; c<9; c++) {
                    const col = document.createElement('div');
                    col.className = 'column'; col.dataset.col = c;
                    const slot = document.createElement('div');
                    slot.className = 'entry-slot'; slot.id = `slot-${id.split('-')[1]}-${c}`;
                    col.appendChild(slot);
                    for(let r=0; r<4; r++) {
                        const t = document.createElement('div');
                        t.className = `tile ${data[r*9+c].hidden ? 'hidden' : ''}`;
                        t.innerText = data[r*9+c].char;
                        col.appendChild(t);
                    }
                    el.appendChild(col);
                }
            };
            draw('grid-p1', this.p1Data); draw('grid-cpu', this.cpuData);
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').disabled = true;
            await this.handleChain(this.deck.pop(), 'p1');
        },

        async handleChain(card, turn) {
            document.getElementById('slot-preview').innerText = card.char;
            let side = card.isWild ? turn : (card.group === this.p1.name ? 'p1' : (card.group === this.cpu.name ? 'cpu' : turn));
            
            if (side === 'p1') {
                if (card.isWild) {
                    this.log("вҳ… иҗ¬з”ЁзүҢпјҡи«Ӣй»һйҒёж¬ІжҺЁе…Ҙзҡ„иЎҢеҲ— вҳ…");
                    this.prepWild(card);
                } else {
                    this.prepPush(card.val - 1, card);
                }
            } else {
                let col = card.isWild ? this.aiCol() : (card.val - 1);
                await new Promise(r => setTimeout(r, 700));
                await this.executePush('cpu', col, card);
            }
        },

        prepWild(card) {
            const cols = document.querySelectorAll('#grid-p1 .column');
            cols.forEach(el => {
                el.classList.add('highlight');
                el.onclick = () => {
                    cols.forEach(c => { c.classList.remove('highlight'); c.onclick = null; });
                    this.prepPush(parseInt(el.dataset.col), card);
                };
            });
        },

        prepPush(col, card) {
            this.log("жҢүдҪҸзүҢеҗ‘дёӢж»‘еӢ•жҺЁе…Ҙ");
            const slot = document.getElementById(`slot-p1-${col}`);
            slot.innerText = card.char; slot.classList.add('active');
            
            slot.ontouchstart = (e) => this.touchStart = e.touches[0].clientY;
            slot.ontouchend = (e) => {
                if ((e.changedTouches[0].clientY - this.touchStart) > 20) {
                    slot.classList.remove('active');
                    this.executePush('p1', col, card);
                }
            };
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const bumped = {...data[3*9+col]};
            for(let r=3; r>0; r--) data[r*9+col] = {...data[(r-1)*9+col]};
            data[col] = {...card, hidden: false};

            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const tiles = colEl.querySelectorAll('.tile');
            tiles.forEach(t => t.style.transition = '0.2s');
            tiles.forEach(t => t.style.transform = 'translateY(var(--tile-h))');
            
            await new Promise(r => setTimeout(r, 200));
            this.renderCol(side, col);

            if(this.checkWin()) return;
            if(bumped && bumped.char) {
                bumped.hidden = false;
                await this.handleChain(bumped, side);
            } else {
                this.isBusy = false;
                document.getElementById('draw-btn').disabled = false;
                this.log(`еү©йӨҳзүҢж•ёпјҡ${this.deck.length}`);
            }
        },

        renderCol(side, col) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const tiles = document.querySelectorAll(`#grid-${side} .column[data-col="${col}"] .tile`);
            for(let r=0; r<4; r++) {
                tiles[r].className = `tile ${data[r*9+col].hidden ? 'hidden' : ''}`;
                tiles[r].innerText = data[r*9+col].char;
                tiles[r].style.transform = 'none';
            }
        },

        aiCol() {
            for(let c=0; c<9; c++) if(this.cpuData[3*9+c].hidden) return c;
            return Math.floor(Math.random()*9);
        },

        checkWin() {
            const full = (d) => d.every(c => !c.hidden);
            if(full(this.p1Data)) return this.end(true);
            if(full(this.cpuData)) return this.end(false);
            return false;
        },

        end(win) {
            const o = document.getElementById('overlay');
            o.style.display = 'flex';
            o.innerHTML = win ? '<span style="color:#fbbf24">рҹҺү дҪ иҙҸдәҶпјҒ</span>' : '<span>йӣ»и…ҰзҚІеӢқ...</span>';
            o.onclick = () => location.reload();
            return true;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    window.onload = () => game.init();
</script>
</body>
</html>
