<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大滿貫 - 終極穩定版</title>
    <style>
        :root {
            --bg-color: #064e3b;
            --tile-w: calc((100vw - 44px) / 9);
            --tile-h: calc(var(--tile-w) * 1.35);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        .header { padding: 12px; text-align: center; background: rgba(0,0,0,0.8); color: #fbbf24; font-weight: bold; border-bottom: 2px solid #15803d; }
        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; }
        
        .grid { display: flex; gap: 4px; justify-content: center; }
        .column { display: flex; flex-direction: column; gap: 4px; width: var(--tile-w); border-radius: 4px; transition: 0.3s; border: 1px solid transparent; }
        .column.selectable { background: rgba(251, 191, 36, 0.3); border-color: #fbbf24; cursor: pointer; }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); background: #fff; border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: inset -1px -1px 3px #ccc, 1px 1px 3px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }
        /* 圖片與備援畫法的大小控制 */
        .tile img, .tile svg { width: 90%; height: 95%; object-fit: contain; display: block; }
        
        /* 蓋牌狀態：完全隱藏內容，顯示背面 */
        .tile.hidden { 
            background: linear-gradient(135deg, #166534, #064e3b); 
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tile.hidden * { display: none !important; }

        #grid-cpu { transform: rotate(180deg); }
        .animate-push { animation: pushIn 0.3s ease-out forwards; }
        @keyframes pushIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .controls { padding: 20px; background: #000; display: flex; justify-content: center; align-items: center; gap: 30px; padding-bottom: calc(25px + env(safe-area-inset-bottom)); border-top: 1px solid #15803d; }
        .draw-btn { width: 80px; height: 100px; background: #15803d; border: 3px solid #fff; border-radius: 12px; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .draw-btn.disabled { opacity: 0.3; pointer-events: none; }
        .slot { width: 80px; height: 100px; background: #fff; border: 2px solid #fbbf24; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="header" id="msg">正在初始化牌組...</div>

<div class="game-main">
    <div class="board"><div class="grid" id="grid-cpu"></div></div>
    <div class="board"><div class="grid" id="grid-p1"></div></div>
</div>

<div class="controls">
    <div class="draw-btn" id="draw-btn" onclick="game.startByDrawing()">抽</div>
    <div id="slot" class="slot"></div>
</div>

<script>
    // 備援 SVG 畫法 (當 GitHub 圖片抓不到時自動啟用)
    const FALLBACK_SVG = {
        m: (val) => `<svg viewBox="0 0 100 125"><text x="50" y="55" text-anchor="middle" font-size="50" font-weight="bold" fill="#e11d48">${val}</text><text x="50" y="95" text-anchor="middle" font-size="35" font-weight="bold" fill="#e11d48">萬</text></svg>`,
        p: (val) => `<svg viewBox="0 0 100 125"><text x="50" y="70" text-anchor="middle" font-size="60" font-weight="bold" fill="#2563eb">${val}</text><circle cx="50" cy="95" r="8" fill="#2563eb"/></svg>`,
        z: () => `<svg viewBox="0 0 100 125"><text x="50" y="85" text-anchor="middle" font-size="80" font-weight="900" fill="#be123c">中</text></svg>`
    };

    // GitHub 資源路徑
    const ASSET_ROOT = "https://cdn.jsdelivr.net/gh/FluffyStuff/riichi-mahjong-tiles@master/svg/bordered/";
    const FILE_MAP = { m: 'Man', p: 'Pin', z: 'Chun' };

    const game = {
        p1Suit: 'm', cpuSuit: 'p', deck: [], p1Data: [], cpuData: [], 
        isBusy: false, gameOver: false, pendingWild: null,

        init() {
            const isM = Math.random() > 0.5;
            this.p1Suit = isM ? 'm' : 'p';
            this.cpuSuit = isM ? 'p' : 'm';
            this.log(`你是【${isM?'萬子':'筒子'}】，電腦是【${isM?'筒子':'萬子'}】`);
            this.buildDeck();
            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.render();
        },

        buildDeck() {
            let cards = [];
            for(let i=1; i<=9; i++) {
                for(let n=0; n<4; n++) {
                    cards.push({ suit: 'm', val: i, src: `${ASSET_ROOT}Man${i}.svg` });
                    cards.push({ suit: 'p', val: i, src: `${ASSET_ROOT}Pin${i}.svg` });
                }
            }
            cards.push({ suit: 'z', val: 7, isWild: true, src: `${ASSET_ROOT}Chun.svg` });
            this.deck = cards.sort(() => Math.random() - 0.5);
        },

        render() {
            const drawGrid = (id, data) => {
                const el = document.getElementById(id); el.innerHTML = '';
                for(let col=0; col<9; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column'; colDiv.dataset.col = col; colDiv.dataset.side = id.split('-')[1];
                    for(let row=0; row<4; row++) colDiv.appendChild(this.createTileEl(data[row*9+col]));
                    el.appendChild(colDiv);
                }
            };
            drawGrid('grid-p1', this.p1Data); drawGrid('grid-cpu', this.cpuData);
        },

        createTileEl(card) {
            const d = document.createElement('div');
            d.className = `tile ${card.hidden ? 'hidden' : ''}`;
            
            const img = new Image();
            img.src = card.src;
            // 關鍵防錯：圖片失敗時切換到內嵌 SVG
            img.onerror = () => {
                img.remove();
                d.innerHTML = FALLBACK_SVG[card.suit](card.val);
            };
            
            d.appendChild(img);
            return d;
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').classList.add('disabled');
            await this.handleChain(this.deck.pop(), 'p1');
            if(!this.gameOver) document.getElementById('draw-btn').classList.remove('disabled');
            this.isBusy = false;
        },

        async handleChain(card, currentTurn) {
            const slot = document.getElementById('slot');
            slot.innerHTML = '';
            slot.appendChild(this.createTileEl(card));
            await new Promise(r => setTimeout(r, 450));

            let side = (card.suit === this.p1Suit) ? 'p1' : (card.suit === this.cpuSuit) ? 'cpu' : currentTurn;

            if (card.isWild && side === 'p1') {
                this.log("★ 紅中！請選擇一列推入 ★");
                this.toggleSelectable(true);
                this.pendingWild = { card, side };
                return;
            }

            let col = (card.val >= 1 && card.val <= 9) ? (card.val - 1) : this.autoFindCol(side);
            await this.executePush(side, col, card);
        },

        toggleSelectable(on) {
            document.querySelectorAll('#grid-p1 .column').forEach(el => {
                el.classList.toggle('selectable', on);
                el.onclick = on ? () => this.resolveWild(parseInt(el.dataset.col)) : null;
            });
        },

        async resolveWild(col) {
            const { card, side } = this.pendingWild;
            this.pendingWild = null;
            this.toggleSelectable(false);
            await this.executePush(side, col, card);
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const bumped = {...data[3 * 9 + col]};
            for(let r=3; r>0; r--) data[r*9 + col] = {...data[(r-1)*9 + col]};
            data[col] = {...card, hidden: false};

            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            colEl.removeChild(colEl.lastElementChild);
            const newTile = this.createTileEl(data[col]);
            newTile.classList.add('animate-push');
            colEl.prepend(newTile);

            await new Promise(r => setTimeout(r, 350));
            if(this.checkWin()) return;
            
            if(bumped) {
                bumped.hidden = false;
                let nextTurn = (bumped.suit === this.p1Suit) ? 'p1' : (bumped.suit === this.cpuSuit) ? 'cpu' : side;
                await this.handleChain(bumped, nextTurn);
            }
        },

        autoFindCol(side) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            for(let c=0; c<9; c++) if([0,1,2,3].some(r => data[r*9 + c].hidden)) return c;
            return 0;
        },

        checkWin() {
            const isFull = (data) => data.every(c => !c.hidden);
            if(isFull(this.p1Data) || isFull(this.cpuData)) {
                this.gameOver = true;
                this.log(isFull(this.p1Data) ? "🎊 玩家大滿貫勝利！" : "電腦大滿貫勝利...");
                return true;
            }
            return false;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    game.init();
</script>
</body>
</html>
