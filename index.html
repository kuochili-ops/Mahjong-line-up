<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>白六麻將 - 實體動態版</title>
    <style>
        :root {
            --full-h: 100dvh;
            --tile-w: calc((100vw - 40px) / 9); 
            --tile-h: calc(var(--tile-w) * 1.35);
            --gap: 2px;
            --bg-color: #064e3b;
            --font-size: calc(var(--tile-w) * 0.95); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            background: var(--bg-color); margin: 0; padding: 0;
            height: var(--full-h); display: flex; flex-direction: column;
            overflow: hidden; color: white; font-family: -apple-system, sans-serif;
        }
        
        .header { height: 44px; display: flex; align-items: center; justify-content: center; background: #000; color: #fbbf24; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .game-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px 0; position: relative; }
        .grid { display: flex; gap: var(--gap); justify-content: center; }
        .column { display: flex; flex-direction: column; gap: var(--gap); width: var(--tile-w); position: relative; }

        /* 萬用牌選中特效 */
        .column.highlight { background: rgba(251, 191, 36, 0.3); border-radius: 4px; box-shadow: 0 0 20px #fbbf24; }

        .tile-base {
            background: #fff; border-radius: 3px; 
            display: flex; justify-content: center; align-items: center; 
            color: #000; line-height: 0.8; padding-bottom: 6px; overflow: hidden;
            box-shadow: inset -1px -1px 2px #ccc, 1px 1px 3px rgba(0,0,0,0.4);
        }

        /* 準備推入的「懸浮牌」 */
        .entry-slot { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            top: calc((var(--tile-h) + 12px) * -1); 
            font-size: var(--font-size);
            z-index: 50; opacity: 0; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
        }
        .entry-slot.active { 
            opacity: 1; pointer-events: auto;
            animation: floating 1.5s infinite ease-in-out;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }

        .tile { width: var(--tile-w); height: var(--tile-h); font-size: var(--font-size); }
        .tile.hidden { background: linear-gradient(135deg, #166534, #064e3b); color: transparent !important; border: 1px solid #052e16; padding: 0; }

        #grid-cpu { transform: rotate(180deg); }
        
        .controls { 
            height: 120px; background: #111; display: flex; 
            justify-content: center; align-items: center; gap: 20px; 
            padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
            perspective: 1000px; /* 為了 3D 翻牌 */
        }
        
        /* 3D 翻牌容器 */
        .card-flipper {
            width: 65px; height: 85px; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-flipper.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: 6px; border: 3px solid #fbbf24;
        }
        .card-back { background: linear-gradient(135deg, #166534, #064e3b); transform: rotateY(0deg); }
        .card-front { background: #fff; transform: rotateY(180deg); font-size: 55px; }

        .draw-btn { 
            width: 80px; height: 80px; background: linear-gradient(to bottom, #22c55e, #15803d); 
            border: 3px solid #fff; border-radius: 50%; font-size: 18px; font-weight: bold; color: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }
        .draw-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        #overlay { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.9); font-size: 32px; font-weight: bold; }
    </style>
</head>
<body>
<div id="overlay"></div>
<div class="header" id="msg">白六麻將</div>

<div class="game-area">
    <div id="grid-cpu" class="grid"></div>
    <div id="grid-p1" class="grid"></div>
</div>

<div class="controls">
    <div id="flipper" class="card-flipper">
        <div class="card-back"></div>
        <div id="card-front" class="card-front tile-base"></div>
    </div>
    <button id="draw-btn" class="draw-btn">抽牌</button>
</div>

<script>
    const MASTERS = {
        '萬': ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'],
        '筒': ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'],
        '條': ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘']
    };
    const OTHERS = ['🀄','🀅','🀆','🀀','🀁','🀂','🀃'];

    const game = {
        p1: null, cpu: null, deck: [], p1Data: [], cpuData: [],
        isBusy: false, gameOver: false, touchStart: 0, wildChar: '',

        init() {
            const keys = Object.keys(MASTERS).sort(() => Math.random() - 0.5);
            this.p1 = { name: keys[0], tiles: MASTERS[keys[0]] };
            this.cpu = { name: keys[1], tiles: MASTERS[keys[1]] };
            const wildPool = [...MASTERS[keys[2]], ...OTHERS];
            this.wildChar = wildPool[Math.floor(Math.random() * wildPool.length)];

            this.log(`玩家：${this.p1.name} | 電腦：${this.cpu.name}`);
            
            let cards = [];
            [this.p1, this.cpu].forEach(g => {
                g.tiles.forEach((char, idx) => {
                    for(let n=0; n<4; n++) cards.push({ group: g.name, val: idx+1, char, isWild: false });
                });
            });
            cards.push({ group: 'wild', val: 0, char: this.wildChar, isWild: true });
            this.deck = cards.sort(() => Math.random() - 0.5);

            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            
            this.render();
            document.getElementById('draw-btn').onclick = () => this.startByDrawing();
        },

        render() {
            const draw = (id, data) => {
                const el = document.getElementById(id);
                el.innerHTML = '';
                for(let c=0; c<9; c++) {
                    const col = document.createElement('div');
                    col.className = 'column'; col.dataset.col = c;
                    const slot = document.createElement('div');
                    slot.className = 'entry-slot tile-base'; slot.id = `slot-${id.split('-')[1]}-${c}`;
                    col.appendChild(slot);
                    for(let r=0; r<4; r++) {
                        const t = document.createElement('div');
                        t.className = `tile tile-base ${data[r*9+c].hidden ? 'hidden' : ''}`;
                        // 重要：如果隱藏就不填寫文字內容，徹底防止透視
                        t.innerText = data[r*9+c].hidden ? "" : data[r*9+c].char;
                        col.appendChild(t);
                    }
                    el.appendChild(col);
                }
            };
            draw('grid-p1', this.p1Data); draw('grid-cpu', this.cpuData);
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').disabled = true;

            const flipper = document.getElementById('flipper');
            const cardFront = document.getElementById('card-front');
            const card = this.deck.pop();

            // 1. 翻牌動畫
            flipper.classList.remove('flipped');
            await new Promise(r => setTimeout(r, 100));
            cardFront.innerText = card.char; // 翻轉中途才填入花色
            flipper.classList.add('flipped');
            
            await new Promise(r => setTimeout(r, 600)); // 等待翻牌完成
            await this.handleChain(card, 'p1');
        },

        async handleChain(card, turn) {
            let side = card.isWild ? turn : (card.group === this.p1.name ? 'p1' : (card.group === this.cpu.name ? 'cpu' : turn));
            
            if (side === 'p1') {
                if (card.isWild) {
                    this.log("★ 萬用牌！點擊下方目標列 ★");
                    this.prepWild(card);
                } else {
                    this.log("牌已就緒，下滑推入");
                    this.prepPush(card.val - 1, card);
                }
            } else {
                let col = card.isWild ? this.aiCol() : (card.val - 1);
                this.log("電腦思考中...");
                await new Promise(r => setTimeout(r, 800));
                await this.executePush('cpu', col, card);
            }
        },

        prepWild(card) {
            const cols = document.querySelectorAll('#grid-p1 .column');
            cols.forEach(el => {
                el.classList.add('highlight');
                el.onclick = () => {
                    cols.forEach(c => { c.classList.remove('highlight'); c.onclick = null; });
                    this.prepPush(parseInt(el.dataset.col), card);
                };
            });
        },

        async prepPush(col, card) {
            const slot = document.getElementById(`slot-p1-${col}`);
            slot.innerText = card.char;
            
            // 2. 位移動畫：從下方飛到對應列頂端
            slot.classList.add('active');
            
            slot.ontouchstart = (e) => this.touchStart = e.touches[0].clientY;
            slot.ontouchend = (e) => {
                if ((e.changedTouches[0].clientY - this.touchStart) > 15) {
                    slot.classList.remove('active');
                    this.executePush('p1', col, card);
                }
            };
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const bumped = {...data[3*9+col]};
            for(let r=3; r+1>1; r--) data[r*9+col] = {...data[(r-1)*9+col]};
            data[col] = {...card, hidden: false};

            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            colEl.style.transform = (side === 'p1') ? 'translateY(8px)' : 'translateY(-8px)';
            
            const tiles = colEl.querySelectorAll('.tile');
            tiles.forEach(t => {
                t.style.transition = 'transform 0.2s cubic-bezier(0.2, 0, 0.2, 1)';
                t.style.transform = 'translateY(var(--tile-h))';
            });
            
            await new Promise(r => setTimeout(r, 200));
            colEl.style.transform = 'none';
            this.renderCol(side, col);

            if(this.checkWin()) return;

            if(bumped && bumped.char) {
                // 3. 牌被擠出後的動畫流程
                this.log("牌被擠出了！");
                document.getElementById('flipper').classList.remove('flipped');
                await new Promise(r => setTimeout(r, 300));
                document.getElementById('card-front').innerText = bumped.char;
                document.getElementById('flipper').classList.add('flipped');
                await new Promise(r => setTimeout(r, 600));
                
                bumped.hidden = false;
                await this.handleChain(bumped, side);
            } else {
                this.isBusy = false;
                document.getElementById('draw-btn').disabled = false;
                document.getElementById('flipper').classList.remove('flipped');
                this.log(`牌組剩餘：${this.deck.length}`);
            }
        },

        renderCol(side, col) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const tiles = document.querySelectorAll(`#grid-${side} .column[data-col="${col}"] .tile`);
            for(let r=0; r<4; r++) {
                tiles[r].className = `tile tile-base ${data[r*9+col].hidden ? 'hidden' : ''}`;
                tiles[r].innerText = data[r*9+col].hidden ? "" : data[r*9+col].char;
                tiles[r].style.transform = 'none';
            }
        },

        aiCol() {
            for(let c=0; c<9; c++) if(this.cpuData[3*9+c].hidden) return c;
            return Math.floor(Math.random()*9);
        },

        checkWin() {
            const full = (d) => d.every(c => !c.hidden);
            if(full(this.p1Data)) return this.end(true);
            if(full(this.cpuData)) return this.end(false);
            return false;
        },

        end(win) {
            const o = document.getElementById('overlay');
            o.style.display = 'flex';
            o.innerHTML = win ? '🎊 勝利！ 🎊' : '電腦獲勝...';
            o.onclick = () => location.reload();
            return true;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    window.onload = () => game.init();
</script>
</body>
</html>
