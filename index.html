<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大滿貫 - 手感滑動版</title>
    <style>
        :root {
            --bg-color: #064e3b;
            --tile-w: 32px; /* 縮小方塊，貼近系統字感 */
            --tile-h: 44px;
            --gap: 4px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background: var(--bg-color); margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        .header { padding: 8px; text-align: center; background: rgba(0,0,0,0.8); color: #fbbf24; font-size: 14px; border-bottom: 1px solid #15803d; }
        
        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: var(--tile-h); } /* 中間空出一個方塊高度 */
        
        .grid { display: flex; gap: var(--gap); justify-content: center; position: relative; }
        .column { display: flex; flex-direction: column; gap: var(--gap); width: var(--tile-w); position: relative; }

        /* 預備區：顯示即將推入的牌 */
        .entry-slot { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            top: calc((var(--tile-h) + var(--gap)) * -1); 
            background: #fff; border-radius: 4px; display: flex; justify-content: center; align-items: center;
            font-size: 28px; color: #000; box-shadow: 0 0 10px #fbbf24; z-index: 10;
            opacity: 0; transform: translateY(10px); transition: 0.3s;
        }
        .entry-slot.active { opacity: 1; transform: translateY(0); cursor: grab; }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); background: #fff; border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; font-size: 28px; color: #000;
            box-shadow: inset -1px -1px 2px #ccc, 1px 1px 2px rgba(0,0,0,0.3); transition: transform 0.3s;
        }
        .tile.hidden { background: linear-gradient(135deg, #22c55e, #14532d); color: transparent; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }

        #grid-cpu { transform: rotate(180deg); }
        
        /* 縮小控制區 */
        .controls { padding: 10px; background: #000; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #15803d; }
        .draw-btn { width: 50px; height: 65px; background: #15803d; border: 2px solid #fff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .draw-btn.disabled { opacity: 0.3; pointer-events: none; }
        .slot-preview { width: 50px; height: 65px; background: #333; border: 1px solid #555; border-radius: 8px; font-size: 32px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="header" id="msg">抽出牌後，按住牌向下滑動推入</div>

<div class="game-main">
    <div class="board"><div class="grid" id="grid-cpu"></div></div>
    <div class="board"><div class="grid" id="grid-p1"></div></div>
</div>

<div class="controls">
    <div class="draw-btn" id="draw-btn" onclick="game.startByDrawing()">抽牌</div>
    <div id="slot-preview" class="slot-preview"></div>
</div>

<script>
    const TILES = {
        m: ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'],
        p: ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'],
        z: '🀄'
    };

    const game = {
        p1Suit: 'm', cpuSuit: 'p', deck: [], p1Data: [], cpuData: [],
        isBusy: false, gameOver: false,
        touchStartY: 0, activeEntry: null,

        init() {
            const isM = Math.random() > 0.5;
            this.p1Suit = isM ? 'm' : 'p';
            this.cpuSuit = isM ? 'p' : 'm';
            this.log(`你是【${isM?'萬子':'筒子'}】`);
            this.buildDeck();
            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.render();
        },

        buildDeck() {
            let cards = [];
            for(let i=1; i<=9; i++) {
                for(let n=0; n<4; n++) {
                    cards.push({ suit: 'm', val: i, char: TILES.m[i-1] });
                    cards.push({ suit: 'p', val: i, char: TILES.p[i-1] });
                }
            }
            cards.push({ suit: 'z', val: 7, isWild: true, char: TILES.z });
            this.deck = cards.sort(() => Math.random() - 0.5);
        },

        render() {
            const drawGrid = (id, data) => {
                const el = document.getElementById(id); el.innerHTML = '';
                for(let col=0; col<9; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column'; colDiv.dataset.col = col;
                    
                    // 加入推牌入口位
                    const entry = document.createElement('div');
                    entry.className = 'entry-slot';
                    entry.id = `entry-${id.split('-')[1]}-${col}`;
                    colDiv.appendChild(entry);

                    for(let row=0; row<4; row++) {
                        const t = document.createElement('div');
                        t.className = `tile ${data[row*9+col].hidden ? 'hidden' : ''}`;
                        t.innerText = data[row*9+col].char;
                        colDiv.appendChild(t);
                    }
                    el.appendChild(colDiv);
                }
            };
            drawGrid('grid-p1', this.p1Data); drawGrid('grid-cpu', this.cpuData);
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').classList.add('disabled');
            await this.handleChain(this.deck.pop(), 'p1');
        },

        async handleChain(card, currentTurn) {
            document.getElementById('slot-preview').innerText = card.char;
            let side = (card.suit === this.p1Suit) ? 'p1' : (card.suit === this.cpuSuit) ? 'cpu' : currentTurn;

            // 尋找對應列
            let col = (card.val >= 1 && card.val <= 9) ? (card.val - 1) : this.autoFindCol(side);
            
            if (side === 'p1') {
                this.log(card.isWild ? "紅中！請選擇一列向下滑動推入" : "請在發光的牌上向下滑動");
                this.waitForSlide(side, col, card, card.isWild);
            } else {
                // 電腦自動推牌
                await new Promise(r => setTimeout(r, 600));
                await this.executePush('cpu', col, card);
            }
        },

        waitForSlide(side, targetCol, card, isWild) {
            const cols = isWild ? [0,1,2,3,4,5,6,7,8] : [targetCol];
            cols.forEach(c => {
                const entry = document.getElementById(`entry-p1-${c}`);
                entry.innerText = card.char;
                entry.classList.add('active');
                
                entry.ontouchstart = (e) => this.touchStartY = e.touches[0].clientY;
                entry.ontouchend = (e) => {
                    const deltaY = e.changedTouches[0].clientY - this.touchStartY;
                    if (deltaY > 20) { // 向下滑動超過 20px
                        this.clearEntries();
                        this.executePush('p1', c, card);
                    }
                };
            });
        },

        clearEntries() {
            document.querySelectorAll('.entry-slot').forEach(e => {
                e.classList.remove('active');
                e.ontouchstart = e.ontouchend = null;
            });
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            
            // 取得被擠出的牌
            const bumped = {...data[3 * 9 + col]};
            
            // 資料位移
            for(let r=3; r>0; r--) data[r*9 + col] = {...data[(r-1)*9 + col]};
            data[col] = {...card, hidden: false};

            // 視覺動畫：整列往下移
            const tiles = colEl.querySelectorAll('.tile');
            tiles.forEach(t => t.style.transform = 'translateY(var(--tile-h))');
            
            await new Promise(r => setTimeout(r, 300));

            // 重繪該列
            this.renderCol(side, col);

            if(this.checkWin()) return;
            
            if(bumped) {
                bumped.hidden = false;
                let nextTurn = (bumped.suit === this.p1Suit) ? 'p1' : (bumped.suit === this.cpuSuit) ? 'cpu' : side;
                await this.handleChain(bumped, nextTurn);
            } else {
                this.isBusy = false;
                document.getElementById('draw-btn').classList.remove('disabled');
            }
        },

        renderCol(side, col) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const tiles = colEl.querySelectorAll('.tile');
            for(let r=0; r<4; r++) {
                tiles[r].className = `tile ${data[r*9+col].hidden ? 'hidden' : ''}`;
                tiles[r].innerText = data[r*9+col].char;
                tiles[r].style.transform = 'none';
            }
        },

        autoFindCol(side) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            for(let c=0; c<9; c++) if([0,1,2,3].some(r => data[r*9 + c].hidden)) return c;
            return 0;
        },

        checkWin() {
            const isFull = (d) => d.every(c => !c.hidden);
            if(isFull(this.p1Data) || isFull(this.cpuData)) {
                this.gameOver = true;
                this.log(isFull(this.p1Data) ? "🎊 勝利！" : "電腦勝利");
                return true;
            }
            return false;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    game.init();
</script>
</body>
</html>
