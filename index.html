<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>хдзц╗┐ш▓л - Unicode чмжшЩЯчЙИ</title>
    <style>
        :root {
            --bg-color: #064e3b;
            --tile-w: calc((100vw - 44px) / 9);
            --tile-h: calc(var(--tile-w) * 1.35);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        .header { padding: 12px; text-align: center; background: rgba(0,0,0,0.8); color: #fbbf24; font-weight: bold; border-bottom: 2px solid #15803d; }
        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; }
        .grid { display: flex; gap: 4px; justify-content: center; }
        .column { display: flex; flex-direction: column; gap: 4px; width: var(--tile-w); border-radius: 4px; transition: 0.3s; }
        .column.selectable { background: rgba(251, 191, 36, 0.3); box-shadow: 0 0 10px #fbbf24; cursor: pointer; }

        /* щ║╗х░ЗчЙМцигх╝П */
        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background: #fff; border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: calc(var(--tile-w) * 0.9); /* шЗкхЛХщБйцЗЙшЮвх╣Ххдзх░ПчЪДчмжшЩЯ */
            color: #000;
            box-shadow: inset -1px -1px 2px #ccc, 1px 1px 3px rgba(0,0,0,0.3);
            line-height: 1;
        }
        
        /* шУЛчЙМшГМщЭв */
        .tile.hidden { 
            background: linear-gradient(135deg, #22c55e, #14532d); 
            color: transparent;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }

        #grid-cpu { transform: rotate(180deg); }
        @keyframes pushIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-push { animation: pushIn 0.3s ease-out forwards; }

        .controls { padding: 20px; background: #000; display: flex; justify-content: center; align-items: center; gap: 30px; padding-bottom: calc(25px + env(safe-area-inset-bottom)); }
        .draw-btn { width: 80px; height: 100px; background: #15803d; border: 3px solid #fff; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .draw-btn.disabled { opacity: 0.3; pointer-events: none; }
        .slot { width: 80px; height: 100px; background: #fff; border: 2px solid #fbbf24; border-radius: 12px; font-size: 70px; display: flex; justify-content: center; align-items: center; color: #000; }
    </style>
</head>
<body>

<div class="header" id="msg">Unicode чмжшЩЯчЙИя╝Ъ100% ф╕Нхд▒чЬЯ</div>

<div class="game-main">
    <div class="board"><div class="grid" id="grid-cpu"></div></div>
    <div class="board"><div class="grid" id="grid-p1"></div></div>
</div>

<div class="controls">
    <div class="draw-btn" id="draw-btn" onclick="game.startByDrawing()">цК╜</div>
    <div id="slot" class="slot"></div>
</div>

<script>
    // щ║╗х░ЗчмжшЩЯх░НчЕзшби
    const TILES = {
        m: ['ЁЯАЗ','ЁЯАИ','ЁЯАЙ','ЁЯАК','ЁЯАЛ','ЁЯАМ','ЁЯАН','ЁЯАО','ЁЯАП'], // шРмхнР 1-9
        p: ['ЁЯАЩ','ЁЯАЪ','ЁЯАЫ','ЁЯАЬ','ЁЯАЭ','ЁЯАЮ','ЁЯАЯ','ЁЯАа','ЁЯАб'], // чнТхнР 1-9
        z: 'ЁЯАД' // ч┤Еф╕н
    };

    const game = {
        p1Suit: 'm', cpuSuit: 'p', deck: [], p1Data: [], cpuData: [], 
        isBusy: false, gameOver: false,

        init() {
            const isM = Math.random() > 0.5;
            this.p1Suit = isM ? 'm' : 'p';
            this.cpuSuit = isM ? 'p' : 'm';
            this.log(`ф╜ацШпуАР${isM?'шРмхнР':'чнТхнР'}уАСя╝МщЫ╗шЕжцШпуАР${isM?'чнТхнР':'шРмхнР'}уАС`);
            this.buildDeck();
            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.render();
        },

        buildDeck() {
            let cards = [];
            for(let i=1; i<=9; i++) {
                for(let n=0; n<4; n++) {
                    cards.push({ suit: 'm', val: i, char: TILES.m[i-1] });
                    cards.push({ suit: 'p', val: i, char: TILES.p[i-1] });
                }
            }
            cards.push({ suit: 'z', val: 7, isWild: true, char: TILES.z });
            this.deck = cards.sort(() => Math.random() - 0.5);
        },

        render() {
            const drawGrid = (id, data) => {
                const el = document.getElementById(id); el.innerHTML = '';
                for(let col=0; col<9; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column'; colDiv.dataset.col = col;
                    for(let row=0; row<4; row++) colDiv.appendChild(this.createTileEl(data[row*9+col]));
                    el.appendChild(colDiv);
                }
            };
            drawGrid('grid-p1', this.p1Data); drawGrid('grid-cpu', this.cpuData);
        },

        createTileEl(card) {
            const d = document.createElement('div');
            d.className = `tile ${card.hidden ? 'hidden' : ''}`;
            d.innerText = card.char;
            return d;
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').classList.add('disabled');
            await this.handleChain(this.deck.pop(), 'p1');
            if(!this.gameOver) document.getElementById('draw-btn').classList.remove('disabled');
            this.isBusy = false;
        },

        async handleChain(card, currentTurn) {
            document.getElementById('slot').innerText = card.char;
            await new Promise(r => setTimeout(r, 450));

            let side = (card.suit === this.p1Suit) ? 'p1' : (card.suit === this.cpuSuit) ? 'cpu' : currentTurn;

            if (card.isWild && side === 'p1') {
                this.log("тШЕ цК╜хИ░ч┤Еф╕ня╝БшлЛщ╗ЮцУКф╕ЛцЦ╣ф╕АхИЧцОихЕе тШЕ");
                this.enableSelection(card);
                return;
            }

            let col = (card.val >= 1 && card.val <= 9) ? (card.val - 1) : this.autoFindCol(side);
            await this.executePush(side, col, card);
        },

        enableSelection(card) {
            document.querySelectorAll('#grid-p1 .column').forEach(el => {
                el.classList.add('selectable');
                el.onclick = () => {
                    document.querySelectorAll('.column').forEach(c => { c.classList.remove('selectable'); c.onclick = null; });
                    this.executePush('p1', parseInt(el.dataset.col), card);
                };
            });
        },

        async executePush(side, col, card) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const bumped = {...data[3 * 9 + col]};
            for(let r=3; r>0; r--) data[r*9 + col] = {...data[(r-1)*9 + col]};
            data[col] = {...card, hidden: false};

            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            colEl.removeChild(colEl.lastElementChild);
            const newTile = this.createTileEl(data[col]);
            newTile.classList.add('animate-push');
            colEl.prepend(newTile);

            await new Promise(r => setTimeout(r, 350));
            if(this.checkWin()) return;
            
            if(bumped) {
                bumped.hidden = false;
                let nextTurn = (bumped.suit === this.p1Suit) ? 'p1' : (bumped.suit === this.cpuSuit) ? 'cpu' : side;
                await this.handleChain(bumped, nextTurn);
            }
        },

        autoFindCol(side) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            for(let c=0; c<9; c++) if([0,1,2,3].some(r => data[r*9 + c].hidden)) return c;
            return 0;
        },

        checkWin() {
            const isFull = (data) => data.every(c => !c.hidden);
            if(isFull(this.p1Data) || isFull(this.cpuData)) {
                this.gameOver = true;
                this.log(isFull(this.p1Data) ? "ЁЯОК чОйхо╢хдзц╗┐ш▓лхЛЭхИйя╝Б" : "щЫ╗шЕжхдзц╗┐ш▓лхЛЭхИй...");
                return true;
            }
            return false;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    game.init();
</script>
</body>
</html>
