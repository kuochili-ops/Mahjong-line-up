<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>зҷҪе…ӯйә»е°Ү - дёүеӨ§иҠұиүІ</title>
    <style>
        :root {
            --bg-color: #064e3b;
            --tile-w: 42px; 
            --tile-h: 56px;
            --gap: 5px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background: var(--bg-color); margin: 0; font-family: "PingFang TC", sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        .header { padding: 12px; text-align: center; background: rgba(0,0,0,0.8); color: #fbbf24; font-size: 18px; font-weight: bold; border-bottom: 2px solid #15803d; }
        
        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: calc(var(--tile-h) + 12px); position: relative; }
        
        .grid { display: flex; gap: var(--gap); justify-content: center; position: relative; }
        .column { display: flex; flex-direction: column; gap: var(--gap); width: var(--tile-w); position: relative; }

        .entry-slot { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            top: calc((var(--tile-h) + var(--gap)) * -1); 
            background: #fff; border-radius: 6px; display: flex; justify-content: center; align-items: center;
            font-size: 38px; color: #000; box-shadow: 0 0 15px #fbbf24; z-index: 10;
            opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .entry-slot.active { opacity: 1; pointer-events: auto; transform: scale(1.1); }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); background: #fff; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; font-size: 38px; color: #000;
            box-shadow: inset -2px -2px 4px #ccc, 2px 2px 5px rgba(0,0,0,0.4); 
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .tile.hidden { background: linear-gradient(135deg, #22c55e, #14532d); color: transparent; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); }

        #grid-cpu { transform: rotate(180deg); }
        
        .controls { padding: 15px; background: #000; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 2px solid #15803d; }
        .draw-btn { width: 65px; height: 80px; background: #15803d; border: 3px solid #fff; border-radius: 10px; font-size: 18px; font-weight: bold; color: #fff; cursor: pointer; }
        .draw-btn:active { transform: translateY(2px); }
        .draw-btn.disabled { opacity: 0.3; pointer-events: none; }
        .slot-preview { width: 60px; height: 75px; background: #fff; border-radius: 8px; font-size: 45px; display: flex; justify-content: center; align-items: center; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        #overlay { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.85); font-size: 40px; font-weight: bold; }
        .win { color: #fbbf24; text-shadow: 0 0 20px #fbbf24; animation: pop 0.5s infinite alternate; }
        .lose { color: #94a3b8; }
        @keyframes pop { from { transform: scale(1); } to { transform: scale(1.15); } }
    </style>
</head>
<body>

<div id="overlay"></div>
<div class="header" id="msg">жҙ—зүҢдёӯ...</div>

<div class="game-main">
    <div class="board"><div class="grid" id="grid-cpu"></div></div>
    <div class="board"><div class="grid" id="grid-p1"></div></div>
</div>

<div class="controls">
    <div class="draw-btn" id="draw-btn" onclick="game.startByDrawing()">жҠҪзүҢ</div>
    <div id="slot-preview" class="slot-preview"></div>
</div>

<script>
    const Sound = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play() {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.1);
        }
    };

    const MASTERS = {
        'иҗ¬': ['рҹҖҮ','рҹҖҲ','рҹҖү','рҹҖҠ','рҹҖӢ','рҹҖҢ','рҹҖҚ','рҹҖҺ','рҹҖҸ'],
        'зӯ’': ['рҹҖҷ','рҹҖҡ','рҹҖӣ','рҹҖң','рҹҖқ','рҹҖһ','рҹҖҹ','рҹҖ ','рҹҖЎ'],
        'жўқ': ['рҹҖҗ','рҹҖ‘','рҹҖ’','рҹҖ“','рҹҖ”','рҹҖ•','рҹҖ–','рҹҖ—','рҹҖҳ']
    };

    const OTHERS = ['рҹҖҖ','рҹҖҒ','рҹҖӮ','рҹҖғ','рҹҖ…','рҹҖҶ','рҹҖ„'];

    const game = {
        p1: null, cpu: null, deck: [], p1Data: [], cpuData: [],
        isBusy: false, gameOver: false, touchStartY: 0,

        init() {
            const keys = Object.keys(MASTERS).sort(() => Math.random() - 0.5);
            this.p1 = { name: keys[0], tiles: MASTERS[keys[0]] };
            this.cpu = { name: keys[1], tiles: MASTERS[keys[1]] };
            this.wildName = keys[2]; // з¬¬дёүзЁ®иҠұиүІи®ҠжҲҗиҗ¬з”ЁзүҢ

            this.log(`дҪ жҳҜгҖҗ${this.p1.name}гҖ‘пјҢйӣ»и…ҰжҳҜгҖҗ${this.cpu.name}гҖ‘`);
            this.buildDeck();
            
            this.p1Data = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.cpuData = this.deck.splice(0, 36).map(c => ({...c, hidden: true}));
            this.render();
        },

        buildDeck() {
            let cards = [];
            // йӣҷж–№дё»иҠұиүІеҗ„ 36 ејө
            [this.p1, this.cpu].forEach(group => {
                group.tiles.forEach((char, idx) => {
                    for(let n=0; n<4; n++) cards.push({ group: group.name, val: idx+1, char: char, isWild: false });
                });
            });
            // з¬¬дёүзЁ®иҠұиүІ 36 ејөи®ҠжҲҗиҗ¬з”ЁзүҢ
            MASTERS[this.wildName].forEach(char => {
                for(let n=0; n<4; n++) cards.push({ group: 'wild', val: 0, char: char, isWild: true });
            });
            // еӯ—зүҢд№ҹеҠ е…Ҙиҗ¬з”ЁзүҢжұ 
            OTHERS.forEach(char => {
                for(let n=0; n<4; n++) cards.push({ group: 'wild', val: 0, char: char, isWild: true });
            });

            this.deck = cards.sort(() => Math.random() - 0.5);
        },

        render() {
            const drawGrid = (id, data) => {
                const el = document.getElementById(id); el.innerHTML = '';
                for(let col=0; col<9; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column'; colDiv.dataset.col = col;
                    const entry = document.createElement('div');
                    entry.className = 'entry-slot'; entry.id = `entry-${id.split('-')[1]}-${col}`;
                    colDiv.appendChild(entry);
                    for(let row=0; row<4; row++) {
                        const t = document.createElement('div');
                        t.className = `tile ${data[row*9+col].hidden ? 'hidden' : ''}`;
                        t.innerText = data[row*9+col].char;
                        colDiv.appendChild(t);
                    }
                    el.appendChild(colDiv);
                }
            };
            drawGrid('grid-p1', this.p1Data); drawGrid('grid-cpu', this.cpuData);
        },

        async startByDrawing() {
            if(this.isBusy || this.gameOver) return;
            this.isBusy = true;
            document.getElementById('draw-btn').classList.add('disabled');
            if(this.deck.length === 0) { this.log("зүҢзө„е·Із©әпјҒ"); return; }
            await this.handleChain(this.deck.pop(), 'p1');
        },

        async handleChain(card, currentTurn) {
            document.getElementById('slot-preview').innerText = card.char;
            let side = (card.group === this.p1.name) ? 'p1' : (card.group === this.cpu.name) ? 'cpu' : currentTurn;
            let col = (card.val >= 1 && card.val <= 9) ? (card.val - 1) : this.autoFindCol(side);
            
            if (side === 'p1') {
                this.log(card.isWild ? "вҳ… иҗ¬з”ЁзүҢпјҒиҮӘз”ұж»‘еӢ•жҺЁе…Ҙ" : "и«Ӣеҗ‘дёӢжҺЁе…Ҙзҷје…үзҡ„зүҢ");
                this.waitForSlide(side, col, card, card.isWild);
            } else {
                await new Promise(r => setTimeout(r, 600));
                await this.executePush('cpu', col, card);
            }
        },

        waitForSlide(side, targetCol, card, isWild) {
            const cols = isWild ? [0,1,2,3,4,5,6,7,8] : [targetCol];
            cols.forEach(c => {
                const entry = document.getElementById(`entry-p1-${c}`);
                entry.innerText = card.char; entry.classList.add('active');
                entry.ontouchstart = (e) => this.touchStartY = e.touches[0].clientY;
                entry.ontouchend = (e) => {
                    if ((e.changedTouches[0].clientY - this.touchStartY) > 30) {
                        this.clearEntries();
                        this.executePush('p1', c, card);
                    }
                };
            });
        },

        clearEntries() {
            document.querySelectorAll('.entry-slot').forEach(e => {
                e.classList.remove('active');
                e.ontouchstart = e.ontouchend = null;
            });
        },

        async executePush(side, col, card) {
            Sound.play();
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const bumped = {...data[3 * 9 + col]};

            for(let r=3; r>0; r--) data[r*9 + col] = {...data[(r-1)*9 + col]};
            data[col] = {...card, hidden: false};

            const tiles = colEl.querySelectorAll('.tile');
            tiles.forEach(t => t.style.transform = 'translateY(var(--tile-h))');
            
            await new Promise(r => setTimeout(r, 250));
            this.renderCol(side, col);

            if(this.checkWin()) return;
            
            if(bumped && bumped.char) {
                bumped.hidden = false;
                let nextTurn = (bumped.group === this.p1.name) ? 'p1' : (bumped.group === this.cpu.name) ? 'cpu' : side;
                await this.handleChain(bumped, nextTurn);
            } else {
                this.isBusy = false;
                document.getElementById('draw-btn').classList.remove('disabled');
            }
        },

        renderCol(side, col) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            const colEl = document.querySelector(`#grid-${side} .column[data-col="${col}"]`);
            const tiles = colEl.querySelectorAll('.tile');
            for(let r=0; r<4; r++) {
                tiles[r].className = `tile ${data[r*9+col].hidden ? 'hidden' : ''}`;
                tiles[r].innerText = data[r*9+col].char;
                tiles[r].style.transform = 'none';
            }
        },

        autoFindCol(side) {
            const data = (side === 'p1') ? this.p1Data : this.cpuData;
            for(let c=0; c<9; c++) if([0,1,2,3].some(r => data[r*9 + c].hidden)) return c;
            return Math.floor(Math.random() * 9);
        },

        checkWin() {
            const isFull = (d) => d.every(c => !c.hidden);
            if(isFull(this.p1Data)) return this.endGame(true);
            if(isFull(this.cpuData)) return this.endGame(false);
            return false;
        },

        endGame(isWin) {
            this.gameOver = true;
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = isWin ? '<div class="win">рҹҺҠ еӨ§ ж»ҝ иІ« рҹҺҠ</div>' : '<div class="lose">ж®ҳеҝө...йӣ»и…ҰеӢқ</div>';
            overlay.onclick = () => location.reload();
            return true;
        },

        log(t) { document.getElementById('msg').innerText = t; }
    };

    game.init();
</script>
</body>
</html>
